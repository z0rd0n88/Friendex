[mypy]
python_version = 3.11
strict = True
warn_unused_configs = True
warn_return_any = True
warn_redundant_casts = True
warn_unused_ignores = True
show_error_codes = True
show_column_numbers = True
pretty = True
mypy_path = src
namespace_packages = True
explicit_package_bases = True

[mypy-discord.*]
ignore_missing_imports = True

[mypy-freezegun.*]
ignore_missing_imports = True

# Tests are checked under a relaxed profile (Wave 3 #82 H18). Strict-mode
# would surface ~700 noise errors driven by common test idioms: positional
# args on AsyncMock(spec=...) wrappers, the discord.py app_commands.Command
# .callback(...) keyword-arg invocation pattern, MagicMock attribute access,
# legacy `# type: ignore` comments accumulated before the gate existed, and
# parametrize matrices that legitimately mix types per row.
#
# The profile below still catches the substantive bugs the H18 review flagged
# — missing Generator return annotations on yield-fixtures, untyped helper
# wrapper classes (e.g. ``_BarrierUserRepo``), union-attr leaks, attribute-
# access typos, and stale ``# type: ignore`` whose error code no longer
# matches the reported diagnostic.
#
# ``disable_error_code`` covers exactly the codes whose volume is dominated
# by the test-pattern noise above:
#   - ``arg-type``: MagicMock passed to typed Callable parameters / kwargs
#                   splat into typed dataclasses (parametrize matrices).
#   - ``call-arg``: ``Command.callback`` keyword args; pydantic Settings
#                   constructor kwargs via ``# type: ignore[call-arg]`` idiom.
#   - ``misc``: ``Command.callback`` multi-value-for-kwarg false-positive.
#
# This list is intentionally narrow — broader categories (e.g. ``union-attr``,
# ``attr-defined``, ``type-var``, ``operator``, ``return``, ``assignment``)
# stay enabled so they surface real bugs in test setup code.
[mypy-tests.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False
disallow_untyped_decorators = False
disallow_untyped_calls = False
disallow_subclassing_any = False
disallow_any_generics = False
warn_return_any = False
warn_unused_ignores = False
disable_error_code = arg-type, call-arg, misc
