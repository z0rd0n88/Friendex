# Gateway listener surface: text/media/reply messages, reactions (including
# the dropped self-react and bot cases), voice join/leave/switch, the VC-ping
# flow, and the activity price tick + vc_boost tasks feeding off them.
name: activity-listeners
description: Listener events accumulate activity that moves prices.
start_at: "2026-05-25 12:00:00"
guild: {id: 900400, name: Activity Server}
settings:
  vc_ping_role_ids: [555]
users:
  alice: {id: 1111, price: "100.00"}
  bob: {id: 2222, price: "100.00"}
  carol: {id: 3333, price: "100.00"}
timeline:
  - label: alice sends three text messages
    event: message
    args: {author: alice}
    repeat: 3
    expect:
      state: {alice: {today: {text_msgs: 3}, week: {text_msgs: 3}}}

  - label: alice posts a picture
    at: "+1m"
    event: message
    args: {author: alice, attachment: true}
    expect:
      state: {alice: {today: {media_msgs: 1}}}

  - label: bob replies to someone
    at: "+1m"
    event: message
    args: {author: bob, reply: true}
    expect:
      state: {bob: {today: {reply_count: 1}}}

  - label: bob reacts to alice's message
    at: "+1m"
    event: reaction
    args: {reactor: bob, message_author: alice}
    expect:
      state: {bob: {today: {reaction_count: 1}}}

  - label: self-reactions are dropped
    at: "+1m"
    event: reaction
    args: {reactor: alice, message_author: alice}
    expect:
      state: {alice: {today: {reaction_count: 0}}}

  - label: reactions on bot-authored messages are dropped
    at: "+1m"
    event: reaction
    args: {reactor: carol, message_author: carol, message_author_bot: true}
    expect:
      state: {carol: {today: {reaction_count: 0}}}

  - label: bot-authored messages credit nobody
    at: "+1m"
    event: message
    args: {author: carol, author_bot: true}
    expect:
      state: {carol: {today: {text_msgs: 0}}}

  - label: bob joins a voice channel
    at: "+1m"
    event: voice_join
    args: {user: bob, channel: 200}

  - label: bob leaves after 30 minutes
    at: "+30m"
    event: voice_leave
    args: {user: bob, channel: 200}
    expect:
      state: {bob: {today: {voice_minutes: {ge: 29, le: 31}}}}

  - label: carol joins VC 200
    at: "+1m"
    event: voice_join
    args: {user: carol, channel: 200}

  - label: carol switches to VC 201 after 10 minutes
    at: "+10m"
    event: voice_switch
    args: {user: carol, from: 200, to: 201}

  - label: carol leaves after 10 more minutes
    at: "+10m"
    event: voice_leave
    args: {user: carol, channel: 201}
    expect:
      state: {carol: {today: {voice_minutes: {ge: 19, le: 21}}}}

  # --- VC ping flow: host in VC mentions a configured ping role -----------
  - label: alice joins VC 300 to host
    at: "+1m"
    event: voice_join
    args: {user: alice, channel: 300}

  - label: alice pings the VC role from inside the channel
    at: "+1m"
    event: message
    args: {author: alice, mention_role: 555, role_members: [alice]}

  - label: bob answers the ping by joining VC 300
    at: "+2m"
    event: voice_join
    args: {user: bob, channel: 300}

  - label: vc_boost tick processes the ping session boosts
    at: "+15m"
    task: vc_boost

  - label: activity tick converts the day's engagement into price moves
    at: "+1m"
    task: activity_tick
    expect:
      price:
        alice: {gt: "100"}
        bob: {gt: "100"}

  - label: trending shows the movers
    at: "+1m"
    command: trending
    actor: carol
    expect:
      reply: {ephemeral: false}

  - label: alice reviews her own stats
    at: "+1m"
    command: mystats
    actor: alice
    expect:
      reply: {ephemeral: true}
