# Alembic configuration for Friendex.
#
# The database URL is supplied at runtime from the ``DATABASE_URL`` environment
# variable (see ``alembic/env.py``); the ``sqlalchemy.url`` value below is only a
# non-functional placeholder so the file is valid when ``DATABASE_URL`` is unset.
# Mirror the application default (``sqlite+aiosqlite:///data/friendex.db``).

[alembic]
# Path to migration scripts, relative to this file's directory.
script_location = alembic

# Prepend the project root to sys.path so ``import friendex...`` resolves in env.py.
prepend_sys_path = .

# Use os.pathsep for any path lists (default for new projects).
path_separator = os

# Placeholder only — overridden by DATABASE_URL in env.py. Kept as the async
# SQLite default so a stray run without DATABASE_URL fails loudly rather than
# silently targeting some unrelated database.
sqlalchemy.url = sqlite+aiosqlite:///data/friendex.db


# Logging configuration consumed by env.py's fileConfig call.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
