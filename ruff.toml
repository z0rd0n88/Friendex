line-length = 88
target-version = "py311"
src = ["src", "tests"]

[lint]
select = [
    "E",     # pycodestyle errors
    "F",     # pyflakes
    "W",     # pycodestyle warnings
    "I",     # isort
    "B",     # flake8-bugbear
    "UP",    # pyupgrade
    "SIM",   # flake8-simplify
    "RUF",   # ruff-specific
    "ASYNC", # flake8-async
    "C4",    # flake8-comprehensions
    "TCH",   # flake8-type-checking
    "PTH",   # flake8-use-pathlib (prefer pathlib over os.path)
    "ERA",   # eradicate (no commented-out code)
]

[lint.per-file-ignores]
"tests/**/*.py" = ["B011"]   # allow `assert False` in tests
"__init__.py" = ["F401"]     # re-exports

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
