name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: "lint / type / test (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --all-extras --python ${{ matrix.python-version }}

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Mypy (strict, src/ and tests/)
        # Wave 3 #82 H18: tests/ joined the gate; see mypy.ini for the
        # [mypy-tests.*] relaxation rationale (per-module config still wins
        # over the --strict CLI flag).
        run: uv run mypy --strict src/ tests/

      - name: Pytest (with coverage)
        # Wave 3 #82 M9: gate set to 95 (rounded down from the 95.62 % baseline
        # measured on 2026-05-30); project rule mandates 80 % minimum.
        run: uv run pytest --cov=friendex --cov-fail-under=95
